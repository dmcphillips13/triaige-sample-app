name: Visual Regression Tests

on:
  push:
    branches: [main]

jobs:
  visual-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - run: npm run build

      - name: Run Playwright visual tests
        run: npx playwright test
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Post failures to Triaige runner (stub)
        if: always()
        run: |
          echo "TODO: Wire up in Step 16 — parse test-results/results.json and POST failures to Triaige runner"
          echo "See scripts/post-failures.sh"
