name: Visual Regression Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to use for triage context (for retriggers)"
        required: false

jobs:
  # Lightweight job for push-to-main: just close pre-merge runs, no tests needed
  close-pr-runs:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Close pre-merge runs
        env:
          TRIAIGE_RUNNER_URL: ${{ secrets.TRIAIGE_RUNNER_URL }}
          TRIAIGE_API_KEY: ${{ secrets.TRIAIGE_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # Extract PR number from merge commit message (squash/merge commits)
          MERGE_MSG=$(git log -1 --format="%s" HEAD)
          PR_NUMBER=""
          if [[ "$MERGE_MSG" =~ Merge\ pull\ request\ \#([0-9]+) ]]; then
            PR_NUMBER="${BASH_REMATCH[1]}"
          fi

          # Fallback: query GitHub API for associated PR (rebase/fast-forward merges)
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER=$(gh api repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls --jq '.[0].number' 2>/dev/null || true)
          fi

          echo "Closing pre-merge runs for PR #${PR_NUMBER:-unknown}"
          curl -s -X POST "${TRIAIGE_RUNNER_URL}/report-clean" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${TRIAIGE_API_KEY}" \
            -d "{\"repo\": \"${GITHUB_REPOSITORY}\", \"head_sha\": \"${GITHUB_SHA}\", \"pr_number\": ${PR_NUMBER:-null}, \"event\": \"push\"}" || true

  # Full visual regression test job for PRs and retriggers
  visual-tests:
    runs-on: ubuntu-latest
    if: github.event_name != 'push' && !contains(github.event.head_commit.message, 'triaige/update-baselines')
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - name: Resolve PR branch for workflow_dispatch
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.pr_number != ''
        id: pr-ref
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REF=$(gh pr view ${{ github.event.inputs.pr_number }} --repo ${{ github.repository }} --json headRefName --jq '.headRefName')
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr-ref.outputs.ref || '' }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - run: npm run build

      - name: Run Playwright visual tests
        run: npx playwright test
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Post failures to Triaige
        if: always()
        env:
          TRIAIGE_RUNNER_URL: ${{ secrets.TRIAIGE_RUNNER_URL }}
          TRIAIGE_API_KEY: ${{ secrets.TRIAIGE_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          TRIAIGE_PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          TRIAIGE_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: bash scripts/post-failures.sh
