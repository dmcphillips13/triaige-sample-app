name: Visual Regression Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to use for triage context (for retriggers)"
        required: false

jobs:
  visual-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - run: npm run build

      - name: Run Playwright visual tests
        run: npx playwright test
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Post failures to Triaige
        if: always()
        env:
          TRIAIGE_RUNNER_URL: ${{ secrets.TRIAIGE_RUNNER_URL }}
          TRIAIGE_API_KEY: ${{ secrets.TRIAIGE_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          TRIAIGE_PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
        run: bash scripts/post-failures.sh
